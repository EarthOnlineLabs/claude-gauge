<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ClaudeGauge — your Claude Code usage, live in the menu bar</title>
<meta name="description" content="A macOS menu bar gauge for Claude Code (Pro/Max) usage. Reads only your official usage numbers — never your conversations or code. Free, open source, zero quota cost." />
<meta property="og:title" content="ClaudeGauge" />
<meta property="og:description" content="Your Claude Code usage in the menu bar — reads only the official numbers, never your chats or code. Free, open source, zero quota cost." />
<meta property="og:type" content="website" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="180x180" href="/favicon.png" />
<link rel="apple-touch-icon" href="/favicon.png" />
<script>
  // 首屏前确定语言，避免语言闪烁（与 React 端 localStorage["cg-lang"] 同源）。
  (function () {
    var saved;
    try { saved = localStorage.getItem('cg-lang'); } catch (e) {}
    var lang = (saved === 'en' || saved === 'zh')
      ? saved
      : ((navigator.language || '').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en');
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.documentElement.dataset.lang = lang;
  })();
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
